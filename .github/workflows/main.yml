name: Build Mini vMac for Kindle

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    # THE FIX: Run the entire build inside NiLuJe's Kindle 5.4 Toolchain!
    container:
      image: ghcr.io/koreader/koxtoolchain:kindle54

    steps:
    - uses: actions/checkout@v3

    - name: Build Emulator
      run: |
        chmod +x build_scripts/build_kindle.sh
        ./build_scripts/build_kindle.sh

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: minivmac-kindle
        path: bld/minivmac
        
