name: Build Mini vMac for Kindle (Musl Static)

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: messense/rust-musl-cross:armv7-musleabihf

    steps:
    - uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        apt-get update || true
        apt-get install -y make curl gcc git || true

    - name: Build Emulator
      run: |
        chmod +x ./build_kindle.sh
        ./build_kindle.sh

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: minivmac-kindle
        # THE FIX: The executable is in the root directory, not the bld/ directory!
        path: minivmac
        
