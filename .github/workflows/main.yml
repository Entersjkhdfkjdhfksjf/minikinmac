name: Build Mini vMac for Kindle (Koxtoolchain)

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/koreader/koxtoolchain:kindle54

    steps:
    - uses: actions/checkout@v4

    - name: Build Emulator
      run: |
        chmod +x build_scripts/build_kindle.sh
        ./build_scripts/build_kindle.sh

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: minivmac-kindle
        path: bld/minivmac
        
