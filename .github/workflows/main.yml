name: Build Mini vMac for Kindle PW3

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to trigger the build manually from the Actions tab

jobs:
  build-kual-extension:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install ARM Cross-Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf

      - name: Clone and Build FBInk
        run: |
          git clone https://github.com/NiLuJe/FBInk.git
          cd FBInk
          
          # Compile statically for the Kindle PW2/PW3 architecture
          make kindle-pw2
          
          # Install headers and static library directly into the ARM cross-compiler's sysroot
          # This ensures 'arm-linux-gnueabihf-gcc' finds them automatically during the build
          sudo cp release/libfbink.a /usr/arm-linux-gnueabihf/lib/
          sudo cp fbink.h /usr/arm-linux-gnueabihf/include/

      - name: Execute Build Script
        run: |
          # Make sure the script is executable and run it
          chmod +x build_scripts/build_kindle.sh
          ./build_scripts/build_kindle.sh

      - name: Prepare KUAL Extension Package (UC)
        run: |
          # The kual_ext/ folder should already contain your menu.json and launch.sh
          # We just need to create the working directories and move the compiled binary
          
          #mkdir -p kual_ext/bin kual_ext/disks kual_ext/roms
          
          # Move the compiled emulator into the bin folder
          #mv minivmac kual_ext/bin/
          
          # Ensure the launcher script has execution rights
          #chmod +x kual_ext/launch.sh

      - name: Upload KUAL Artifact
        uses: actions/upload-artifact@v4
        with:
          name: minivmac-kindle-pw3
          path: kual_ext/
          
