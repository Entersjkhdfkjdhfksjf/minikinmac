name: Build Mini vMac for Kindle PW3

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Toolchain ─────────────────────────────────────────────────
      - name: Install ARM cross-compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-arm-linux-gnueabihf \
            binutils-arm-linux-gnueabihf \
            libc6-dev-armhf-cross

      # ── 3. Build the Mini vMac setup tool (host native) ─────────────
      - name: Compile setup_t
        run: gcc -O2 -o setup_t setup/tool.c

      # ── 4. Generate build files for Linux ARMv7 ─────────────────────
      #
      # Flags explained:
      #   -t larm          Linux ARM 32-bit (Kindle PW3 = Cortex-A7, ARMv7)
      #   -m Plus          Mac Plus — best software compatibility
      #   -hres 512        Keep native Mac resolution; we scale in MYOSGLUE
      #   -vres 342        (both must be multiples of 32; 512 and 342 qualify)
      #   -emm 0           Absolute mouse mode — required for direct touch
      #   -fullscreen 1    Always fullscreen
      #   -var-fullscreen 0  No runtime toggle; lock it
      #   -sound 0         No audio hardware on Kindle PW3
      #   -iid 1           Ctrl+number mounts disk images at runtime
      #   -speed z         Maximum emulation speed
      #   -mem 4M          4 MB RAM (Mac Plus max)
      #   -api sd2         Generate SDL2 scaffolding (we replace MYOSGLUE.c)
      #
      - name: Run setup_t to generate setup.sh
        run: |
          ./setup_t \
            -n "minivmac-kindle" \
            -t larm \
            -m Plus \
            -hres 512 -vres 342 \
            -emm 0 \
            -fullscreen 1 \
            -var-fullscreen 0 \
            -sound 0 \
            -iid 1 \
            -speed z \
            -mem 4M \
            -api sd2 \
            > setup.sh
          echo "--- setup.sh (first 30 lines) ---"
          head -30 setup.sh

      # ── 5. Run setup.sh — creates Makefile + source symlinks ─────────
      - name: Run setup.sh
        run: |
          bash setup.sh
          echo "--- Files created by setup.sh ---"
          ls -la

      # ── 6. Replace SDL2 MYOSGLUE.c with our Kindle framebuffer one ──
      #
      # The Makefile generated by setup.sh compiles source files directly
      # from src/. With -api sd2, the platform file it will compile is
      # src/UI/SDL2/MYOSGLUE.c. We overwrite it with our implementation.
      #
      - name: Inject Kindle MYOSGLUE.c
        run: |
          echo "Replacing src/UI/SDL2/MYOSGLUE.c with Kindle implementation"
          cp kindle/MYOSGLUE.c src/UI/SDL2/MYOSGLUE.c
          echo "--- Injected file header ---"
          head -8 src/UI/SDL2/MYOSGLUE.c

      # ── 7. Stub out sdl2-config ───────────────────────────────────────
      #
      # The Makefile calls $(shell sdl2-config --cflags) and
      # $(shell sdl2-config --libs).  Our MYOSGLUE.c has no SDL2 dependency,
      # so we provide a stub that returns nothing.
      #
      - name: Create sdl2-config stub
        run: |
          mkdir -p .fakebin
          printf '#!/bin/sh\nexit 0\n' > .fakebin/sdl2-config
          chmod +x .fakebin/sdl2-config
          # Also stub pkg-config for sdl2 in case the Makefile uses that
          printf '#!/bin/sh\nexit 0\n' > .fakebin/pkg-config
          chmod +x .fakebin/pkg-config
          echo "PATH=$(pwd)/.fakebin:$PATH" >> "$GITHUB_ENV"

      # ── 8. Cross-compile for ARMv7 ───────────────────────────────────
      #
      # CC override on the make command line takes precedence over the
      # Makefile's CC = gcc.
      # The ARM flags target Kindle PW3's Cortex-A7 (ARMv7-A + NEON).
      #
      - name: Cross-compile
        run: |
          make -j$(nproc) \
            CC=arm-linux-gnueabihf-gcc \
            CFLAGS="-march=armv7-a -mfpu=neon-vfpv4 -mfloat-abi=hard \
                    -O2 -D_GNU_SOURCE -D_FILE_OFFSET_BITS=64" \
            LDFLAGS="-lm"

      # ── 9. Sanity-check the binary ────────────────────────────────────
      - name: Verify binary architecture
        run: |
          BINARY=$(find . -name "minivmac-kindle" -not -path "./.git/*" | head -1)
          if [ -z "$BINARY" ]; then
            echo "ERROR: binary not found. Listing outputs:"
            ls -la
            exit 1
          fi
          echo "Binary: $BINARY"
          file "$BINARY"
          arm-linux-gnueabihf-strip "$BINARY"
          ls -lh "$BINARY"
          echo "BINARY_PATH=$BINARY" >> "$GITHUB_ENV"

      # ── 10. Package ───────────────────────────────────────────────────
      - name: Package release archive
        run: |
          mkdir -p dist

          cp "$BINARY_PATH" dist/minivmac

          # Launch script — auto-detects the touch input device
          cat > dist/launch.sh << 'LAUNCH'
          #!/bin/sh
          # Mini vMac launcher for Kindle PW3
          # Place vMac.ROM and disk1.dsk alongside this script before running.
          set -e
          cd "$(dirname "$0")"

          # Auto-detect the capacitive touch input device
          for ev in /sys/class/input/event*/name; do
            name=$(cat "$ev" 2>/dev/null)
            case "$name" in
              *touch*|*Touch*|*ts*|*Touchscreen*)
                DEV="/dev/input/$(basename "$(dirname "$ev")")"
                break
              ;;
            esac
          done
          export MINIVMAC_TOUCH="${DEV:-/dev/input/event1}"
          echo "[launch] using touch: $MINIVMAC_TOUCH"

          # Optional: suppress kernel messages on the framebuffer
          echo 0 > /proc/sys/kernel/printk 2>/dev/null || true

          exec ./minivmac
          LAUNCH
          chmod +x dist/launch.sh

          # README
          cat > dist/README.txt << 'README'
          Mini vMac for Kindle Paperwhite 3
          ==================================

          Files required (place in the same directory as the binary):

            vMac.ROM   Mac Plus ROM image (128 KB).
                       Must be extracted legally from a physical Mac Plus.

            disk1.dsk  Bootable Mac disk image — System 6 or System 7.
                       (disk2.dsk … disk6.dsk are also loaded if present)

          Running:
            ./launch.sh          — recommended (auto-detects touch device)
            ./minivmac           — run directly

          If the touch device is not auto-detected, set the env var:
            MINIVMAC_TOUCH=/dev/input/event2 ./minivmac

          Controls:
            Touch screen             Mouse (direct, absolute — like a phone)
            Tap top-right corner     Toggle on-screen keyboard
            Page-turn hardware keys  Space / Delete

          Display:
            The Mac screen (512 × 342) is rendered at 2× scale in landscape
            orientation (hold the Kindle sideways, USB port to the right).
            A2 waveform is used every frame for responsiveness; a full GC16
            refresh runs every ~5 seconds to clear ghosting.
          README

          tar czf minivmac-kindle-armhf.tar.gz -C dist .
          echo "Archive contents:"
          tar tzf minivmac-kindle-armhf.tar.gz

      # ── 11. Upload artifact (every build) ────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: minivmac-kindle-armhf
          path: minivmac-kindle-armhf.tar.gz
          retention-days: 30

      # ── 12. Publish GitHub Release (tag pushes only) ─────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: minivmac-kindle-armhf.tar.gz
          generate_release_notes: true
          body: |
            ## Mini vMac for Kindle Paperwhite 3 — ${{ github.ref_name }}

            ARMv7 hard-float binary, no external dependencies.

            ### Quick start
            1. Jailbreak your Kindle PW3 (KUAL + MobileRead jailbreak)
            2. Enable USB networking
            3. Extract the archive to `/mnt/us/minivmac/` on the Kindle
            4. Copy a legal `vMac.ROM` (Mac Plus, 128 KB) into the same folder
            5. Copy a Mac disk image as `disk1.dsk`
            6. `ssh kindle "cd /mnt/us/minivmac && ./launch.sh"`

            ### Controls
            | Input | Action |
            |---|---|
            | Touch | Mouse cursor (direct, absolute) |
            | Top-right corner tap | Toggle on-screen keyboard |
            | Page-turn buttons | Space / Delete |

            ### Display
            2× integer-scaled landscape view via direct `/dev/fb0` write +
            MXCFB eink waveform ioctls (A2 for frames, GC16 every ~5 s).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
